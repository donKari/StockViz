<!-- ══════════════════════════════════════════════════════════════
  PATCH E — Dans le <script> principal de stock.html
  Ajoute ces fonctions pour brancher le scanner aux produits :
══════════════════════════════════════════════════════════════════ -->
<script>
/**
 * Ouvre le scanner pour un espace donné.
 * Le code détecté est comparé aux noms/codes des produits.
 * Pour l'instant : cherche par nom. Quand tu auras des vrais
 * codes-barres en DB, ajoute un champ `barcode` aux produits.
 */
function openScannerForSpace(sIdx) {
  PWA.openBarcodeScanner(code => {
    const space = spaces[sIdx];
    // Cherche dans cet espace d'abord, puis dans tous les espaces
    const searchIn = [
      ...space.products.map((p, pIdx) => ({ p, sIdx, pIdx })),
      ...spaces.flatMap((s, si) => s.products.map((p, pi) => ({ p, sIdx: si, pIdx: pi })))
    ];
    const found = searchIn.find(({ p }) =>
      p.barcode === code || p.name.toLowerCase() === code.toLowerCase()
    );

    if (found) {
      adjustQty(found.sIdx, found.pIdx, -1);
      toast(`📷 ${found.p.name} — −1`, 'success');
    } else {
      toast(`Code non trouvé : ${code}`, 'warn');
      // Propose d'ajouter le produit avec ce code
      if (confirm(`Code-barres "${code}" non reconnu.\nAjouter un produit avec ce code ?`)) {
        openAddProductInSpace(sIdx);
        // Pré-remplit le nom avec le code pour qu'il le modifie
        setTimeout(() => {
          const nameInput = document.getElementById('product-name');
          if (nameInput) nameInput.value = code;
        }, 100);
      }
    }
  });
}

/**
 * Vérifie les alertes stock et envoie une notification.
 * Appelle cette fonction après chaque mutation (adjustQty, restock…).
 * Exemple : à ajouter à la fin de adjustQty().
 */
function maybeNotifyLowStock() {
  if (typeof spaces !== 'undefined') {
    PWA.checkStockAlertsAndNotify(spaces);
  }
}

/**
 * Active les notifications push depuis les Paramètres.
 * Branche ce bouton dans ton panneau settings :
 * <button onclick="enablePushNotifications()">🔔 Activer les alertes</button>
 */
async function enablePushNotifications() {
  const sub = await PWA.subscribeToPush();
  if (sub) {
    toast('🔔 Notifications activées !', 'success');
    // Sauvegarde la subscription en DB
    // await sb.from('push_subscriptions').upsert({ user_id: currentUser.id, ... });
  } else {
    toast('Notifications non disponibles', 'warn');
  }
}
</script>
